# Manifiesto de skills EXTERNAS: referencias, no copias. `tramalia skills` las
# clona/actualiza desde sus repos a .tramalia/skills/<name>.
# Las 13 skills propias del proyecto (01-… a 13-…) ya viven en .tramalia/skills/.

# Ponytail: ruleset de minimalismo + servidor MCP propio (ponytail-mcp).
# Tras `tramalia skills`, su MCP se puede cablear con `tramalia init --with-ponytail`.
[[skill]]
name   = "ponytail"
source = "git+https://github.com/DietrichGebert/ponytail"
ref    = "main"

