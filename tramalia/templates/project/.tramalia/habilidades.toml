# Manifiesto de skills EXTERNAS: referencias, no copias. `tramalia skills` las
# clona/actualiza desde sus repos a .tramalia/habilidades/<nombre>.
# habilidades.lock.json fija cada referencia a un sha_resuelto; tramalia skills update es la única operación que mueve el bloqueo en modo team.
# Las 16 skills propias del proyecto (01-… a 16-…) ya viven en .tramalia/habilidades/.
# Criterio de cuál instalar y cómo administrarlas: docs → página "Skills".

# Ponytail: ruleset de minimalismo + servidor MCP propio (ponytail-mcp).
# Tras `tramalia skills`, su MCP se puede cablear con `tramalia init --with-ponytail`.
[[habilidad]]
nombre = "ponytail"
fuente = "git+https://github.com/DietrichGebert/ponytail"
referencia = "main"

