site_name: Tramalia
site_description: Capa repo-first de gobierno y evidencia para desarrollo con múltiples agentes IA.
site_url: https://MscottB.github.io/tramalia/
repo_url: https://github.com/MscottB/tramalia
repo_name: tramalia
docs_dir: docs

theme:
  name: material
  language: es
  logo: assets/brand/tramalia-mark.webp
  favicon: assets/brand/favicon.png
  icon:
    repo: fontawesome/brands/github
  font:
    text: Manrope
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Modo oscuro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: es
          name: Español
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Inicio: Home
            Empezar: Get started
            Instalación: Installation
            Flujo completo: Full workflow
            Ejemplo completo: Full example
            Adoptar un repo existente: Adopting an existing repo
            Cómo trabaja una IA: How an AI works
            La interfaz (TUI): The interface (TUI)
            Modelos y esfuerzo por host: Models & effort per host
            Analítica (Python/Databricks): Analytics (Python/Databricks)
            Conceptos: Concepts
            Arquitectura: Architecture
            Patrones de arquitectura: Architecture patterns
            Ecosistema: Ecosystem
            Integraciones: Integrations
            Cómo encaja todo: How it fits together
            Ejecución y gates: Execution & gates
            Contexto e inteligencia de código: Context & code intelligence
            Memoria y eficiencia: Memory & efficiency
            Reglas, skills y agentes: Rules, skills & agents
            Referencia: Reference
            Comandos: Commands
            Herramientas: Tools
            Skills: Skills
            Ayuda (FAQ): Help (FAQ)
            Glosario: Glossary
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true
  # blog: NO habilitado — bug confirmado en la combinación mkdocs-material +
  # mkdocs-static-i18n (docs_structure: suffix): el plugin blog genera sus
  # páginas en un directorio temporal FUERA de docs_dir, y el plugin i18n
  # descarta todo lo que esté fuera de docs_dir al reconstruir por idioma, así
  # que el índice del blog queda vacío (sin posts). Bug de upstream, no de esta
  # config: https://github.com/squidfunk/mkdocs-material/issues/4863
  # Reactivar cuando se resuelva ahí, o si se migra a docs_structure: folder
  # (cambio grande, no justificado solo por el blog).

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Inicio: index.md
  - Empezar:
      - Instalación: instalacion.md
      - Flujo completo: flujo-completo.md
      - Ejemplo completo: ejemplo-completo.md
      - Adoptar un repo existente: adopcion.md
      - Cómo trabaja una IA: como-trabaja-ia.md
      - La interfaz (TUI): interfaz.md
  - Conceptos:
      - Arquitectura: arquitectura.md
      - Patrones de arquitectura: patrones-arquitectura.md
      - Ecosistema: ecosistema.md
  - Integraciones:
      - Cómo encaja todo: interop.md
      - Ejecución y gates: interop-ejecucion.md
      - Contexto e inteligencia de código: interop-contexto.md
      - Memoria y eficiencia: interop-memoria.md
      - Reglas, skills y agentes: interop-agentes.md
      - Modelos y esfuerzo por host: multi-host.md
      - Analítica (Python/Databricks): analitica.md
  - Referencia:
      - Comandos: comandos.md
      - Herramientas: herramientas.md
      - Skills: skills-guia.md
      - Ayuda (FAQ): ayuda.md
      - Glosario: glosario.md
